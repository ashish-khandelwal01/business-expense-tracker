<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales - Business Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: white;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }
        .nav-link {
            color: #495057;
            padding: 15px 20px;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            background-color: #e9ecef;
            color: #667eea;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-graph-up"></i> Business Tracker
        </a>
        <div class="d-flex align-items-center text-white">
            <span class="me-3" >WearCraft</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-md-block sidebar">
            <div class="position-sticky pt-3">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products"><i class="bi bi-box-seam"></i> Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="/expenses"><i class="bi bi-receipt"></i> Expenses</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/sales"><i class="bi bi-cart-check"></i> Sales</a></li>
                    <li class="nav-item"><a class="nav-link" href="/returns"><i class="bi bi-arrow-return-left"></i> Returns</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Sales Management</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#saleModal" onclick="clearForm()">
                    <i class="bi bi-plus-circle"></i> Add Sale
                </button>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>Date</th>
                                <th>Product ID</th>
                                <th>Product Name</th>
                                <th>Quantity</th>
                                <th>Unit Price</th>
                                <th>Total Amount</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody id="salesTable">
                            <tr>
                                <td colspan="7" class="text-center">Loading...</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Sale Modal -->
<div class="modal fade" id="saleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Sale</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="saleForm">
                    <input type="hidden" id="saleId">
                    <div class="mb-3">
                        <label for="Product" class="form-label">Select Product*</label>
                        <select class="form-select" id="Product">
                            <option value="">Choose a product...</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="saleDate" class="form-label">Sale Date</label>
                        <input type="date" class="form-control" id="saleDate" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="quantity" class="form-label">Quantity</label>
                            <input type="number" class="form-control" id="quantity" min="1" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="unitPrice" class="form-label">Unit Price</label>
                            <input type="number" class="form-control" id="unitPrice" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="totalAmount" class="form-label">Total Amount</label>
                        <input type="number" class="form-control" id="totalAmount" step="0.01" min="0" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes (Optional)</label>
                        <textarea class="form-control" id="notes" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveSale()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let sales = [];
    const modal = new bootstrap.Modal(document.getElementById('saleModal'));

    async function loadSales() {
        try {
            const response = await fetch('/api/sales');
            sales = await response.json();
            renderSales();
        } catch (error) {
            console.error('Error loading sales:', error);
        }
    }

    function populateProductDropdown() {
        const dropdown = document.getElementById('Product');
        dropdown.innerHTML = '<option value="">Choose a product...</option>' +
            products.map(p => `<option value="${p.id}">${p.productName};
    }

    function renderSales() {
        const tbody = document.getElementById('salesTable');

        if (sales.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">No sales found</td></tr>';
            return;
        }

        tbody.innerHTML = sales.map(sale => `
            <tr>
                <td>${sale.saleDate}</td>
                <td>${sale.productId}</td>
                <td>${sale.productName}</td>
                <td>${sale.quantity}</td>
                <td>${sale.unitPrice.toFixed(2)}</td>
                <td><strong>${sale.totalAmount.toFixed(2)}</strong></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="editSale(${sale.id})">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteSale(${sale.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function clearForm() {
        document.getElementById('saleForm').reset();
        document.getElementById('saleId').value = '';
        document.getElementById('modalTitle').textContent = 'Add Sale';
        document.getElementById('saleDate').valueAsDate = new Date();
        document.getElementById('totalAmount').value = '0.00';
    }

    function editSale(id) {
        const sale = sales.find(s => s.id === id);
        if (!sale) return;

        document.getElementById('saleId').value = sale.id;
        document.getElementById('productId').value = sale.productId;
        document.getElementById('productName').value = sale.productName;
        document.getElementById('saleDate').value = sale.saleDate;
        document.getElementById('quantity').value = sale.quantity;
        document.getElementById('unitPrice').value = sale.unitPrice;
        document.getElementById('totalAmount').value = sale.totalAmount;
        document.getElementById('notes').value = sale.notes || '';
        document.getElementById('modalTitle').textContent = 'Edit Sale';

        modal.show();
    }

    async function saveSale() {
        const id = document.getElementById('saleId').value;
        const data = {
            productId: document.getElementById('productId').value,
            productName: document.getElementById('productName').value,
            saleDate: document.getElementById('saleDate').value,
            quantity: parseInt(document.getElementById('quantity').value),
            unitPrice: parseFloat(document.getElementById('unitPrice').value),
            notes: document.getElementById('notes').value || null
        };

        try {
            const url = id ? `/api/sales/${id}` : '/api/sales';
            const method = id ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                modal.hide();
                loadSales();
            } else {
                alert('Error saving sale');
            }
        } catch (error) {
            console.error('Error saving sale:', error);
            alert('Error saving sale');
        }
    }

    async function deleteSale(id) {
        if (!confirm('Are you sure you want to delete this sale?')) return;

        try {
            const response = await fetch(`/api/sales/${id}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                loadSales();
            } else {
                alert('Error deleting sale');
            }
        } catch (error) {
            console.error('Error deleting sale:', error);
            alert('Error deleting sale');
        }
    }

    // Auto-calculate total amount
    document.getElementById('quantity').addEventListener('input', calculateTotal);
    document.getElementById('unitPrice').addEventListener('input', calculateTotal);

    function calculateTotal() {
        const quantity = parseFloat(document.getElementById('quantity').value) || 0;
        const unitPrice = parseFloat(document.getElementById('unitPrice').value) || 0;
        document.getElementById('totalAmount').value = (quantity * unitPrice).toFixed(2);
    }

    // Load sales on page load
    document.addEventListener('DOMContentLoaded', loadSales);
</script>
</body>
</html>
