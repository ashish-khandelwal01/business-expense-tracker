<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Business Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .sidebar { min-height: calc(100vh - 56px); background: white; box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1); }
        .nav-link { color: #495057; padding: 15px 20px; transition: all 0.3s; }
        .nav-link:hover, .nav-link.active { background-color: #e9ecef; color: #667eea; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .form-section { display: none; }
        .form-section.active { display: block; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard"><i class="bi bi-graph-up"></i> Business Tracker</a>
        <div class="d-flex align-items-center text-white">
            <span class="me-3">Admin</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-md-block sidebar">
            <div class="position-sticky pt-3">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/products"><i class="bi bi-box-seam"></i> Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="/expenses"><i class="bi bi-receipt"></i> Expenses</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sales"><i class="bi bi-cart-check"></i> Sales</a></li>
                    <li class="nav-item"><a class="nav-link" href="/returns"><i class="bi bi-arrow-return-left"></i> Returns</a></li>
                    <li class="nav-item"><a class="nav-link" href="/monthly-tracker"><i class="bi bi-calendar-month"></i> Monthly Tracker</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Product Management</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="clearForm()">
                    <i class="bi bi-plus-circle"></i> Add / Update Product
                </button>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Description</th>
                                <th>Stock Quantity</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody id="productsTable">
                            <tr><td colspan="5" class="text-center">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add / Update Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="productForm">
                    <div class="mb-3">
                        <label class="form-label">Action Type*</label>
                        <select class="form-select" id="actionType" required onchange="toggleProductForm()">
                            <option value="">Select Action</option>
                            <option value="new">Add New Product</option>
                            <option value="existing">Update Existing Product Stock</option>
                        </select>
                    </div>

                    <!-- New Product Form -->
                    <div id="newProductSection" class="form-section">
                        <div class="mb-3">
                            <label for="productName" class="form-label">Product Name*</label>
                            <input type="text" class="form-control" id="productName">
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="2"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="stockQuantity" class="form-label">Initial Stock Quantity*</label>
                            <input type="number" class="form-control" id="stockQuantity" min="0" value="0">
                        </div>
                    </div>

                    <!-- Existing Product Form -->
                    <div id="existingProductSection" class="form-section">
                        <div class="mb-3">
                            <label for="existingProduct" class="form-label">Select Product*</label>
                            <select class="form-select" id="existingProduct">
                                <option value="">Choose a product...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="quantityChange" class="form-label">Quantity Change*</label>
                            <input type="number" class="form-control" id="quantityChange" placeholder="Enter positive or negative value">
                            <small class="text-muted">Positive to add stock, negative to reduce stock</small>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveProduct()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let products = [];
    const modal = new bootstrap.Modal(document.getElementById('productModal'));

    async function loadProducts() {
        try {
            const response = await fetch('/api/products');
            products = await response.json();
            renderProducts();
            populateProductDropdown();
        } catch (error) {
            console.error('Error loading products:', error);
        }
    }

    function renderProducts() {
        const tbody = document.getElementById('productsTable');
        if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center">No products found</td></tr>';
            return;
        }
        tbody.innerHTML = products.map(product => `
            <tr>
                <td>${product.id}</td>
                <td>${product.productName}</td>
                <td>${product.description || '-'}</td>
                <td>${product.stockQuantity || 0}</td>
                <td>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct(${product.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function populateProductDropdown() {
        const dropdown = document.getElementById('existingProduct');
        dropdown.innerHTML = '<option value="">Choose a product...</option>' +
            products.map(p => `<option value="${p.id}">${p.productName} (Current Stock: ${p.stockQuantity})</option>`).join('');
    }

    function toggleProductForm() {
        const actionType = document.getElementById('actionType').value;
        document.querySelectorAll('.form-section').forEach(section => section.classList.remove('active'));
        
        if (actionType === 'new') {
            document.getElementById('newProductSection').classList.add('active');
        } else if (actionType === 'existing') {
            document.getElementById('existingProductSection').classList.add('active');
        }
    }

    function clearForm() {
        document.getElementById('productForm').reset();
        document.querySelectorAll('.form-section').forEach(section => section.classList.remove('active'));
    }

    async function saveProduct() {
        const actionType = document.getElementById('actionType').value;
        
        if (!actionType) {
            alert('Please select an action type');
            return;
        }

        try {
            if (actionType === 'new') {
                const productName = document.getElementById('productName').value;
                const description = document.getElementById('description').value;
                const stockQuantity = parseInt(document.getElementById('stockQuantity').value) || 0;

                if (!productName) {
                    alert('Product name is required');
                    return;
                }

                const response = await fetch('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productName, description, stockQuantity })
                });

                if (response.ok) {
                    modal.hide();
                    await loadProducts();
                    alert('Product added successfully');
                } else {
                    const error = await response.text();
                    alert('Error: ' + error);
                }
            } else if (actionType === 'existing') {
                const productId = document.getElementById('existingProduct').value;
                const quantityChange = parseInt(document.getElementById('quantityChange').value);

                if (!productId) {
                    alert('Please select a product');
                    return;
                }
                if (isNaN(quantityChange)) {
                    alert('Please enter a valid quantity change');
                    return;
                }

                const response = await fetch(`/api/products/${productId}/stock`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantityChange })
                });

                if (response.ok) {
                    modal.hide();
                    await loadProducts();
                    alert('Stock updated successfully');
                } else {
                    const error = await response.text();
                    alert('Error: ' + error);
                }
            }
        } catch (error) {
            console.error('Error saving product:', error);
            alert('An error occurred while saving');
        }
    }

    async function deleteProduct(id) {
        if (!confirm('Are you sure you want to delete this product?')) return;

        try {
            const response = await fetch(`/api/products/${id}`, { method: 'DELETE' });
            if (response.ok) {
                await loadProducts();
                alert('Product deleted successfully');
            } else {
                alert('Error deleting product');
            }
        } catch (error) {
            console.error('Error deleting product:', error);
            alert('An error occurred while deleting the product');
        }
    }

    document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
