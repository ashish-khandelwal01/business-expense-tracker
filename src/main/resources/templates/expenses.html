<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - Business Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: white;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }
        .nav-link {
            color: #495057;
            padding: 15px 20px;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            background-color: #e9ecef;
            color: #667eea;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-graph-up"></i> Business Tracker
        </a>
        <div class="d-flex align-items-center text-white">
            <span class="me-3" >WearCraft</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-md-block sidebar">
            <div class="position-sticky pt-3">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products"><i class="bi bi-box-seam"></i> Products</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/expenses"><i class="bi bi-receipt"></i> Expenses</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sales"><i class="bi bi-cart-check"></i> Sales</a></li>
                    <li class="nav-item"><a class="nav-link" href="/returns"><i class="bi bi-arrow-return-left"></i> Returns</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Expenses Management</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#expenseModal" onclick="clearForm()">
                    <i class="bi bi-plus-circle"></i> Add Expense
                </button>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th>Product ID</th>
                                <th>Quantity</th>
                                <th>Unit Cost</th>
                                <th>Total Amount</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody id="expensesTable">
                            <tr>
                                <td colspan="8" class="text-center">Loading...</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Expense Modal -->
<div class="modal fade" id="expenseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="expenseForm">
                    <input type="hidden" id="expenseId">
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select" id="category" required>
                            <option value="">Select Category</option>
                            <option value="INVENTORY">Inventory</option>
                            <option value="OVERHEAD">Overhead</option>
                            <option value="RUNNING_COSTS">Running Costs</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <input type="text" class="form-control" id="description" required>
                    </div>
                    <div class="mb-3">
                        <label for="expenseDate" class="form-label">Date</label>
                        <input type="date" class="form-control" id="expenseDate" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="productId" class="form-label">Product ID (Optional)</label>
                            <input type="text" class="form-control" id="productId">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="quantity" class="form-label">Quantity</label>
                            <input type="number" class="form-control" id="quantity" min="0">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="unitCost" class="form-label">Unit Cost</label>
                            <input type="number" class="form-control" id="unitCost" step="0.01" min="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="amount" class="form-label">Total Amount</label>
                            <input type="number" class="form-control" id="amount" step="0.01" min="0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes (Optional)</label>
                        <textarea class="form-control" id="notes" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveExpense()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let expenses = [];
    const modal = new bootstrap.Modal(document.getElementById('expenseModal'));

    async function loadExpenses() {
        try {
            const response = await fetch('/api/expenses');
            expenses = await response.json();
            renderExpenses();
        } catch (error) {
            console.error('Error loading expenses:', error);
        }
    }

    function renderExpenses() {
        const tbody = document.getElementById('expensesTable');

        if (expenses.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center">No expenses found</td></tr>';
            return;
        }

        tbody.innerHTML = expenses.map(expense => `
            <tr>
                <td>${expense.expenseDate}</td>
                <td><span class="badge bg-info">${expense.category}</span></td>
                <td>${expense.description}</td>
                <td>${expense.productId || '-'}</td>
                <td>${expense.quantity || '-'}</td>
                <td>${expense.unitCost ? '$' + expense.unitCost.toFixed(2) : '-'}</td>
                <td>$${expense.amount.toFixed(2)}</td>
                <td>
                    <button class="btn btn-sm btn-outline-primary" onclick="editExpense(${expense.id})">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteExpense(${expense.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function clearForm() {
        document.getElementById('expenseForm').reset();
        document.getElementById('expenseId').value = '';
        document.getElementById('modalTitle').textContent = 'Add Expense';
        document.getElementById('expenseDate').valueAsDate = new Date();
    }

    function editExpense(id) {
        const expense = expenses.find(e => e.id === id);
        if (!expense) return;

        document.getElementById('expenseId').value = expense.id;
        document.getElementById('category').value = expense.category;
        document.getElementById('description').value = expense.description;
        document.getElementById('expenseDate').value = expense.expenseDate;
        document.getElementById('productId').value = expense.productId || '';
        document.getElementById('quantity').value = expense.quantity || '';
        document.getElementById('unitCost').value = expense.unitCost || '';
        document.getElementById('amount').value = expense.amount;
        document.getElementById('notes').value = expense.notes || '';
        document.getElementById('modalTitle').textContent = 'Edit Expense';

        modal.show();
    }

    async function saveExpense() {
        const id = document.getElementById('expenseId').value;
        const data = {
            category: document.getElementById('category').value,
            description: document.getElementById('description').value,
            expenseDate: document.getElementById('expenseDate').value,
            productId: document.getElementById('productId').value || null,
            quantity: parseInt(document.getElementById('quantity').value) || null,
            unitCost: parseFloat(document.getElementById('unitCost').value) || null,
            amount: parseFloat(document.getElementById('amount').value),
            notes: document.getElementById('notes').value || null
        };

        try {
            const url = id ? `/api/expenses/${id}` : '/api/expenses';
            const method = id ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                modal.hide();
                loadExpenses();
            } else {
                alert('Error saving expense');
            }
        } catch (error) {
            console.error('Error saving expense:', error);
            alert('Error saving expense');
        }
    }

    async function deleteExpense(id) {
        if (!confirm('Are you sure you want to delete this expense?')) return;

        try {
            const response = await fetch(`/api/expenses/${id}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                loadExpenses();
            } else {
                alert('Error deleting expense');
            }
        } catch (error) {
            console.error('Error deleting expense:', error);
            alert('Error deleting expense');
        }
    }

    // Auto-calculate total amount
    document.getElementById('quantity').addEventListener('input', calculateTotal);
    document.getElementById('unitCost').addEventListener('input', calculateTotal);

    function calculateTotal() {
        const quantity = parseFloat(document.getElementById('quantity').value) || 0;
        const unitCost = parseFloat(document.getElementById('unitCost').value) || 0;

        if (quantity > 0 && unitCost > 0) {
            document.getElementById('amount').value = (quantity * unitCost).toFixed(2);
        }
    }

    // Load expenses on page load
    document.addEventListener('DOMContentLoaded', loadExpenses);
</script>
</body>
</html>
