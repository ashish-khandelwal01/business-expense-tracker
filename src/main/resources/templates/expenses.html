<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenses - Business Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .sidebar {
            min-height: calc(100vh - 56px);
            background: white;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }
        .nav-link {
            color: #495057;
            padding: 15px 20px;
            transition: all 0.3s;
        }
        .nav-link:hover, .nav-link.active {
            background-color: #e9ecef;
            color: #667eea;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .category-fields {
            display: none;
        }
        .category-fields.active {
            display: block;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">
            <i class="bi bi-graph-up"></i> Business Tracker
        </a>
        <div class="d-flex align-items-center text-white">
            <span class="me-3">WearCraft</span>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-md-block sidebar">
            <div class="position-sticky pt-3">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/products"><i class="bi bi-box-seam"></i> Products</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/expenses"><i class="bi bi-receipt"></i> Expenses</a></li>
                    <li class="nav-item"><a class="nav-link" href="/sales"><i class="bi bi-cart-check"></i> Sales</a></li>
                    <li class="nav-item"><a class="nav-link" href="/returns"><i class="bi bi-arrow-return-left"></i> Returns</a></li>
                </ul>
            </div>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Expenses Management</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#expenseModal" onclick="clearForm()">
                    <i class="bi bi-plus-circle"></i> Add Expense
                </button>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th>Product</th>
                                <th>Details</th>
                                <th>Total Amount</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody id="expensesTable">
                            <tr>
                                <td colspan="7" class="text-center">Loading...</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<!-- Expense Modal -->
<div class="modal fade" id="expenseModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Expense</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="expenseForm">
                    <input type="hidden" id="expenseId">

                    <!-- Category Selection -->
                    <div class="mb-3">
                        <label for="category" class="form-label">Category *</label>
                        <select class="form-select" id="category" required onchange="toggleExpenseFields()">
                            <option value="">Select Category</option>
                            <option value="INVENTORY">Inventory costs</option>
                            <option value="OVERHEAD">Overhead costs</option>
                            <option value="RUNNING">Running costs</option>
                        </select>
                    </div>

                    <!-- Common Fields -->
                    <div class="mb-3">
                        <label for="expenseDate" class="form-label">Date *</label>
                        <input type="date" class="form-control" id="expenseDate" required>
                    </div>

                    <!-- Inventory Cost Fields -->
                    <div id="inventoryFields" class="category-fields">
                        <div class="mb-3">
                            <label for="inventoryProduct" class="form-label">Select Product *</label>
                            <select class="form-select" id="inventoryProduct">
                                <option value="">Choose a product...</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="inventoryQuantity" class="form-label">Quantity *</label>
                                <input type="number" class="form-control" id="inventoryQuantity" min="1" step="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="inventoryCostPerUnit" class="form-label">Cost per Product *</label>
                                <input type="number" class="form-control" id="inventoryCostPerUnit" step="0.01" min="0">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="inventoryTotal">Total Amount</label>
                            <input type="text" class="form-control" id="inventoryTotal" readonly>
                        </div>
                    </div>

                    <!-- Overhead Cost Fields -->
                    <div id="overheadFields" class="category-fields">
                        <div class="mb-3">
                            <label for="overheadProductName" class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="overheadProductName" placeholder="e.g., Office Equipment, Machinery">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="overheadCost" class="form-label">Cost *</label>
                                <input type="number" class="form-control" id="overheadCost" step="0.01" min="0">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="depreciationMonths" class="form-label">Depreciation Months *</label>
                                <input type="number" class="form-control" id="depreciationMonths" min="1" step="1" placeholder="e.g., 12, 24, 36">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="monthlyDepreciation" class="form-label">Monthly Depreciation</label>
                            <input type="text" class="form-control" id="monthlyDepreciation" readonly>
                        </div>
                    </div>

                    <!-- Running Cost Fields -->
                    <div id="runningFields" class="category-fields">
                        <div class="mb-3">
                            <label for="runningProductName" class="form-label">Product Name *</label>
                            <input type="text" class="form-control" id="runningProductName" placeholder="e.g., Electricity, Water, Internet">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="runningAmount" class="form-label">Amount *</label>
                                <input type="number" class="form-control" id="runningAmount" step="0.01" min="0">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="unitsToDistribute" class="form-label">Units to Distribute *</label>
                                <input type="number" class="form-control" id="unitsToDistribute" min="1" step="1" placeholder="Number of units">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="costPerUnit" class="form-label">Cost per Unit</label>
                            <input type="text" class="form-control" id="costPerUnit" readonly>
                        </div>
                    </div>

                    <!-- Notes (Common) -->
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes (Optional)</label>
                        <textarea class="form-control" id="notes" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveExpense()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let expenses = [];
    let products = [];
    const modal = new bootstrap.Modal(document.getElementById('expenseModal'));

    async function loadExpenses() {
        try {
            const response = await fetch('/api/expenses');
            expenses = await response.json();
            renderExpenses();
        } catch (error) {
            console.error('Error loading expenses:', error);
        }
    }

    async function loadProducts() {
        try {
            const response = await fetch('/api/products');
            products = await response.json();
            populateProductDropdown();
        } catch (error) {
            console.error('Error loading products:', error);
        }
    }

    function populateProductDropdown() {
        const dropdown = document.getElementById('inventoryProduct');
        dropdown.innerHTML = '<option value="">Choose a product...</option>' +
            products.map(p => `<option value="${p.id}">${p.productName} (Stock: ${p.stockQuantity})</option>`).join('');
    }

    function renderExpenses() {
        const tbody = document.getElementById('expensesTable');

        if (expenses.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">No expenses found</td></tr>';
            return;
        }

        tbody.innerHTML = expenses.map(expense => {
            let details = '';
            let productInfo = '-';

            if (expense.category === 'INVENTORY') {
                details = `Qty: ${expense.quantity || 0}, Unit Cost: $${(expense.unitCost || 0).toFixed(2)}`;
                productInfo = expense.productId || '-';
            } else if (expense.category === 'OVERHEAD') {
                details = `Depreciation: ${expense.depreciationMonths || 0} months`;
                productInfo = expense.description || '-';
            } else if (expense.category === 'RUNNING') {
                details = `Units: ${expense.unitsToDistribute || 0}`;
                productInfo = expense.description || '-';
            }

            const categoryDisplay = expense.category === 'INVENTORY' ? 'Inventory costs' :
                                   expense.category === 'OVERHEAD' ? 'Overhead costs' : 'Running costs';

            return `
                <tr>
                    <td>${expense.expenseDate}</td>
                    <td><span class="badge bg-info">${categoryDisplay}</span></td>
                    <td>${expense.notes || '-'}</td>
                    <td>${productInfo}</td>
                    <td>${details}</td>
                    <td>$${expense.amount.toFixed(2)}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="editExpense(${expense.id})">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteExpense(${expense.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    function toggleExpenseFields() {
        const category = document.getElementById('category').value;

        // Hide all category fields
        document.querySelectorAll('.category-fields').forEach(field => {
            field.classList.remove('active');
        });

        // Show relevant fields
        if (category === 'INVENTORY') {
            document.getElementById('inventoryFields').classList.add('active');
        } else if (category === 'OVERHEAD') {
            document.getElementById('overheadFields').classList.add('active');
        } else if (category === 'RUNNING') {
            document.getElementById('runningFields').classList.add('active');
        }
    }

    function clearForm() {
        document.getElementById('expenseForm').reset();
        document.getElementById('expenseId').value = '';
        document.getElementById('modalTitle').textContent = 'Add Expense';
        document.getElementById('expenseDate').valueAsDate = new Date();
        toggleExpenseFields();
    }

    function editExpense(id) {
        const expense = expenses.find(e => e.id === id);
        if (!expense) return;

        document.getElementById('expenseId').value = expense.id;
        document.getElementById('category').value = expense.category;
        document.getElementById('expenseDate').value = expense.expenseDate;
        document.getElementById('notes').value = expense.notes || '';

        toggleExpenseFields();

        if (expense.category === 'INVENTORY') {
            document.getElementById('inventoryProduct').value = expense.productId || '';
            document.getElementById('inventoryQuantity').value = expense.quantity || '';
            document.getElementById('inventoryCostPerUnit').value = expense.unitCost || '';
            calculateInventoryTotal();
        } else if (expense.category === 'OVERHEAD') {
            document.getElementById('overheadProductName').value = expense.description || '';
            document.getElementById('overheadCost').value = expense.amount || '';
            document.getElementById('depreciationMonths').value = expense.depreciationMonths || '';
            calculateDepreciation();
        } else if (expense.category === 'RUNNING') {
            document.getElementById('runningProductName').value = expense.description || '';
            document.getElementById('runningAmount').value = expense.amount || '';
            document.getElementById('unitsToDistribute').value = expense.unitsToDistribute || '';
            calculateCostPerUnit();
        }

        document.getElementById('modalTitle').textContent = 'Edit Expense';
        modal.show();
    }

    async function saveExpense() {
        const id = document.getElementById('expenseId').value;
        const category = document.getElementById('category').value;

        if (!category) {
            alert('Please select a category');
            return;
        }

        let data = {
            category: category,
            expenseDate: document.getElementById('expenseDate').value,
            notes: document.getElementById('notes').value || null
        };

        // Build data based on category
        if (category === 'INVENTORY') {
            const productId = document.getElementById('inventoryProduct').value;
            const quantity = parseInt(document.getElementById('inventoryQuantity').value);
            const unitCost = parseFloat(document.getElementById('inventoryCostPerUnit').value);

            if (!productId || !quantity || !unitCost) {
                alert('Please fill all required fields');
                return;
            }

            const product = products.find(p => p.id == productId);
            data.description = product ? product.productName : 'Product';
            data.productId = productId;
            data.quantity = quantity;
            data.unitCost = unitCost;
            data.amount = quantity * unitCost;
        } else if (category === 'OVERHEAD') {
            const productName = document.getElementById('overheadProductName').value;
            const cost = parseFloat(document.getElementById('overheadCost').value);
            const months = parseInt(document.getElementById('depreciationMonths').value);

            if (!productName || !cost || !months) {
                alert('Please fill all required fields');
                return;
            }

            data.description = productName;
            data.amount = cost;
            data.depreciationMonths = months;
        } else if (category === 'RUNNING') {
            const productName = document.getElementById('runningProductName').value;
            const amount = parseFloat(document.getElementById('runningAmount').value);
            const units = parseInt(document.getElementById('unitsToDistribute').value);

            if (!productName || !amount || !units) {
                alert('Please fill all required fields');
                return;
            }

            data.description = productName;
            data.amount = amount;
            data.unitsToDistribute = units;
        }

        try {
            const url = id ? `/api/expenses/${id}` : '/api/expenses';
            const method = id ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                modal.hide();
                loadExpenses();
            } else {
                alert('Error saving expense');
            }
        } catch (error) {
            console.error('Error saving expense:', error);
            alert('Error saving expense');
        }
    }

    async function deleteExpense(id) {
        if (!confirm('Are you sure you want to delete this expense?')) return;

        try {
            const response = await fetch(`/api/expenses/${id}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                loadExpenses();
            } else {
                alert('Error deleting expense');
            }
        } catch (error) {
            console.error('Error deleting expense:', error);
            alert('Error deleting expense');
        }
    }

    // Calculate inventory total
    document.getElementById('inventoryQuantity').addEventListener('input', calculateInventoryTotal);
    document.getElementById('inventoryCostPerUnit').addEventListener('input', calculateInventoryTotal);

    function calculateInventoryTotal() {
        const quantity = parseFloat(document.getElementById('inventoryQuantity').value) || 0;
        const unitCost = parseFloat(document.getElementById('inventoryCostPerUnit').value) || 0;
        const total = quantity * unitCost;
        document.getElementById('inventoryTotal').value = total > 0 ? `$${total.toFixed(2)}` : '';
    }

    // Calculate depreciation
    document.getElementById('overheadCost').addEventListener('input', calculateDepreciation);
    document.getElementById('depreciationMonths').addEventListener('input', calculateDepreciation);

    function calculateDepreciation() {
        const cost = parseFloat(document.getElementById('overheadCost').value) || 0;
        const months = parseFloat(document.getElementById('depreciationMonths').value) || 0;
        const monthly = months > 0 ? cost / months : 0;
        document.getElementById('monthlyDepreciation').value = monthly > 0 ? `$${monthly.toFixed(2)}/month` : '';
    }

    // Calculate cost per unit
    document.getElementById('runningAmount').addEventListener('input', calculateCostPerUnit);
    document.getElementById('unitsToDistribute').addEventListener('input', calculateCostPerUnit);

    function calculateCostPerUnit() {
        const amount = parseFloat(document.getElementById('runningAmount').value) || 0;
        const units = parseFloat(document.getElementById('unitsToDistribute').value) || 0;
        const perUnit = units > 0 ? amount / units : 0;
        document.getElementById('costPerUnit').value = perUnit > 0 ? `$${perUnit.toFixed(2)}/unit` : '';
    }

    // Load data on page load
    document.addEventListener('DOMContentLoaded', () => {
        loadExpenses();
        loadProducts();
    });
</script>
</body>
</html>
